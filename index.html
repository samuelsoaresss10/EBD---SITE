<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EBD Digital — IEADLP</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
:root{
  --bg:#F0F4F8;
  --white:#FFF;
  --blue:#2563EB;
  --navy:#0F172A;
  --text:#1E293B;
  --sub:#64748B;
  --border:#E2E8F0;
  --shadow:0 4px 20px rgba(0,0,0,.05);
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Roboto',sans-serif;background:var(--bg);color:var(--text)}

/* LOGIN */
.login-screen{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0F172A,#2563EB);
}
.login-card{
  width:100%;max-width:360px;
  padding:30px;border-radius:20px;
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(20px);
}
.login-logo{text-align:center}
.login-logo img{width:70px}
.login-igreja{font-size:.8rem;color:rgba(255,255,255,.6);margin-top:8px}
.login-title{color:#fff;font-size:1.4rem;font-weight:700;text-align:center;margin:10px 0}
.lf input{
  width:100%;padding:12px;border-radius:10px;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.08);
  color:#fff;margin-bottom:10px
}
.login-btn{
  width:100%;padding:12px;border:none;border-radius:10px;
  background:var(--blue);color:#fff;font-weight:600
}

/* APP */
.app{display:flex;height:100vh}
.sidebar{
  width:240px;background:var(--navy);color:#fff;
  display:flex;flex-direction:column
}
.sb-logo{display:flex;gap:10px;padding:18px;align-items:center}
.sb-logo img{width:34px}
.sb-brand{font-weight:700}
.sb-sub{font-size:.7rem;opacity:.5}

.main{flex:1;display:flex;flex-direction:column}

.topbar{
  background:#fff;padding:14px 20px;
  display:flex;justify-content:space-between;
  border-bottom:1px solid var(--border);
}

.content{
  flex:1;overflow-y:auto;
  padding:20px;padding-bottom:140px;
}

/* CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(min-width:768px){
  .stat-grid{grid-template-columns:repeat(4,1fr)}
}
.stat-card{background:#fff;padding:16px;border-radius:14px;box-shadow:var(--shadow)}

/* TABLE */
.table-card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
.tw{overflow-x:auto}
table{width:100%;min-width:500px;border-collapse:collapse}
th,td{padding:12px;border-bottom:1px solid var(--border)}

/* MOBILE */
.mob-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:#fff;border-top:1px solid var(--border);
  display:flex
}
.mn-btn{flex:1;padding:8px;font-size:11px;text-align:center}

@media(max-width:640px){
  .sidebar{display:none}
  .content{padding:14px;padding-bottom:150px}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <img src="Logo_sem_Fundo.png">
      <div class="login-igreja">Igreja Assembleia de Deus Lourival Parente</div>
    </div>

    <div class="login-title">EBD Digital</div>

    <div class="lf"><input id="loginUser" placeholder="Usuário"></div>
    <div class="lf"><input id="loginPass" type="password" placeholder="Senha"></div>

    <button class="login-btn" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div class="app hidden" id="app">

  <div class="sidebar">
    <div class="sb-logo">
      <img src="Logo_sem_Fundo.png">
      <div>
        <div class="sb-brand">EBD Digital</div>
        <div class="sb-sub">IEADLP</div>
      </div>
    </div>
  </div>

  <div class="main">

    <div class="topbar">
      <span>Dashboard</span>
      <span id="topDate"></span>
    </div>

    <div class="content">

      <div class="stat-grid">
        <div class="stat-card">Total Alunos</div>
        <div class="stat-card">Classes</div>
        <div class="stat-card">Data</div>
        <div class="stat-card">Mês</div>
      </div>

      <br>

      <div class="table-card">
        <div class="tw">
          <table>
            <tr>
              <th>Classe</th>
              <th>Alunos</th>
              <th>Status</th>
            </tr>
            <tr>
              <td>Bereanos</td>
              <td>24</td>
              <td>Ativa</td>
            </tr>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="mob-nav">
  <div class="mn-btn">Início</div>
  <div class="mn-btn">Chamada</div>
  <div class="mn-btn">Ranking</div>
  <div class="mn-btn">Financeiro</div>
</div>

<script>
function doLogin(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').classList.remove('hidden');
}
document.getElementById('topDate').textContent=new Date().toLocaleDateString('pt-BR');
</script>

</body>
</html>
